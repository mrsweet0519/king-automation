name: Hourly Announcement Monitor
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  monitor-announcements:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright playwright-stealth requests
          playwright install chromium
      - name: Run Boseong Monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATE_PATH: "작업자(에이전트)/scripts/boseong_last_notice.json"
        run: |
          python "작업자(에이전트)/scripts/monitor_boseong.py"
      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add "작업자(에이전트)/scripts/boseong_last_notice.json"
          git diff --quiet && git diff --staged --quiet || git commit -m "Update announcement status [skip ci]"
          git push
