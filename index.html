<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>킹옥션 통합 ERP 통제실</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            /* 기업형 ERP 다크 테마 컬러 */
            --sidebar-bg: #1a1e29;
            --sidebar-hover: #2c3245;
            --sidebar-active: #3a4259;
            --text-main: #ffffff;
            --text-muted: #8b95a5;

            /* 탑바 및 배경 */
            --topbar-bg: #ffffff;
            --topbar-border: #e2e8f0;
            --main-bg: #f5f7f9;

            /* 킹옥션 브랜드 컬러 */
            --brand-primary: #d32f2f;
            --brand-secondary: #ff5252;

            /* 레이아웃 크기 */
            --sidebar-width: 240px;
            --topbar-height: 60px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-color: var(--main-bg);
        }

        /* ----- 사이드바 (좌측 메뉴) ----- */
        .sidebar {
            width: var(--sidebar-width);
            height: 100%;
            background-color: var(--sidebar-bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .sidebar-header {
            height: var(--topbar-height);
            display: flex;
            align-items: center;
            padding: 0 20px;
            background-color: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar-header h1 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-header h1 i {
            color: var(--brand-secondary);
        }

        /* 스크롤 가능한 메뉴 영역 */
        .sidebar-menu {
            flex: 1;
            overflow-y: auto;
            padding: 15px 0;
        }

        /* 스크롤바 커스텀 */
        .sidebar-menu::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar-menu::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .menu-group {
            margin-bottom: 20px;
        }

        .menu-group-title {
            padding: 0 20px;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .menu-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border-left: 3px solid transparent;
        }

        .menu-item:hover {
            background-color: var(--sidebar-hover);
            color: var(--text-main);
        }

        .menu-item.active {
            background-color: var(--sidebar-active);
            color: var(--text-main);
            border-left-color: var(--brand-secondary);
            font-weight: 600;
        }

        .menu-item i {
            width: 20px;
            text-align: center;
            font-size: 1.1rem;
        }

        /* 하단 유저 정보 */
        .sidebar-footer {
            padding: 15px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 15px;
            background-color: rgba(0, 0, 0, 0.1);
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background-color: var(--sidebar-active);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--brand-secondary);
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .user-role {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* ----- 메인 컨텐츠 영역 ----- */
        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            /* flex 버그 방지 */
        }

        /* 상단 네비게이션 바 */
        .topbar {
            height: var(--topbar-height);
            background-color: var(--topbar-bg);
            border-bottom: 1px solid var(--topbar-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* 모바일용 햄버거 메뉴 */
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.2rem;
            color: #333;
            cursor: pointer;
        }

        .current-page-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1a1e29;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 20px;
            color: #64748b;
        }

        .real-time-clock {
            font-size: 0.9rem;
            font-weight: 500;
            background-color: #f1f5f9;
            padding: 5px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .action-icon {
            cursor: pointer;
            transition: color 0.2s;
        }

        .action-icon:hover {
            color: var(--brand-primary);
        }

        /* 아이프레임 컨테이너 */
        .content-container {
            flex: 1;
            position: relative;
            background-color: var(--main-bg);
            padding: 20px;
            overflow: hidden;
            /* iframe 스크롤에 맡김 */
        }

        .app-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: transparent;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            display: none;
            /* 기본 보이지 않음 */
            transition: opacity 0.3s ease;
            opacity: 0;
        }

        .app-iframe.active {
            display: block;
            opacity: 1;
        }

        /* 로딩 애니메이션 */
        .loader-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(245, 247, 249, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            border-radius: 8px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .loader-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(211, 47, 47, 0.2);
            border-radius: 50%;
            border-top-color: var(--brand-primary);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* 반응형 (모바일/태블릿) */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -100%;
                /* 사이드바 숨김 */
                /* 사이드바 메뉴 열릴 때 애니메이션 */
            }

            .sidebar.open {
                left: 0;
                box-shadow: 5px 0 15px rgba(0, 0, 0, 0.1);
            }

            .menu-toggle {
                display: block;
            }

            .real-time-clock span {
                display: none;
                /* 모바일에서는 시계 아이콘만 표시 */
            }

            .content-container {
                padding: 10px;
            }
        }

        /* 사이드바 오버레이 (모바일용 배경 어둡게) */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 999;
            display: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .sidebar-overlay.show {
            display: block;
            opacity: 1;
        }
    </style>
</head>

<body>

    <!-- 모바일용 사이드바 오버레이 -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- 좌측 사이드바 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1><i class="fa-solid fa-crown"></i> 킹옥션 통합 ERP</h1>
        </div>

        <div class="sidebar-menu">
            <div class="menu-section">
                <a class="menu-item active" data-target="dashboard" data-title="마케팅 통합 대시보드">
                    <i class="fa-solid fa-chart-line"></i>
                    <span>마케팅 대시보드</span>
                </a>

                <a class="menu-item" data-target="crm" data-title="고객 관리 (CRM)">
                    <i class="fa-solid fa-users"></i>
                    <span>고객 관리 (CRM)</span>
                </a>

                <a class="menu-item" data-target="content" data-title="콘텐츠 기획 및 분석">
                    <i class="fa-solid fa-lightbulb"></i>
                    <span>콘텐츠 기획 및 분석</span>
                </a>
            </div>
        </div>
    </aside>

    <!-- 우측 메인 영역 -->
    <main class="main-wrapper">
        <!-- 상단바 -->
        <header class="topbar">
            <div class="topbar-left">
                <button class="menu-toggle" id="menuToggle">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div class="current-page-title" id="pageTitle">
                    <i class="fa-solid fa-chart-line" style="color: var(--brand-primary);"></i>
                    <span>마케팅 통합 대시보드</span>
                </div>
            </div>

            <div class="topbar-right">
                <div class="real-time-clock">
                    <i class="fa-regular fa-clock"></i>
                    <span id="currentTime">00:00:00</span>
                </div>
                <i class="fa-solid fa-bell action-icon" title="알림"></i>
                <i class="fa-solid fa-expand action-icon" id="fullscreenToggle" title="전체화면"></i>
            </div>
        </header>

        <!-- 아이프레임 컨테이너 (실제 화면들이 로드되는 곳) -->
        <div class="content-container">
            <div class="loader-overlay" id="loader">
                <div class="spinner"></div>
            </div>

            <!-- 앱 컨테이너들 -->
            <iframe id="iframe-dashboard" class="app-iframe active" src="킹옥션_마케팅_통합_대시보드.html"
                title="마케팅 대시보드"></iframe>
            <iframe id="iframe-crm" class="app-iframe" src="킹옥션_CRM_시스템.html" title="고객관리 시스템"></iframe>
            <iframe id="iframe-content" class="app-iframe" src="킹옥션_콘텐츠_관리보드.html" title="콘텐츠 기획 및 분석"></iframe>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ----- 실시간 시계 로직 -----
            const clockEl = document.getElementById('currentTime');
            function updateClock() {
                const now = new Date();
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const seconds = String(now.getSeconds()).padStart(2, '0');
                clockEl.textContent = `${hours}:${minutes}:${seconds}`;
            }
            setInterval(updateClock, 1000);
            updateClock();

            // ----- 메뉴 탭 전환 로직 (SPA처럼 작동하게 만들기) -----
            const menuItems = document.querySelectorAll('.menu-item[data-target]');
            const pageTitleEl = document.getElementById('pageTitle').querySelector('span');
            const pageTitleIcon = document.getElementById('pageTitle').querySelector('i');
            const loader = document.getElementById('loader');

            menuItems.forEach(item => {
                item.addEventListener('click', function (e) {
                    e.preventDefault();

                    // 이미 활성화된 탭이면 무시
                    if (this.classList.contains('active')) return;

                    // 1. 메뉴 스타일 변경
                    document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
                    this.classList.add('active');

                    // 2. 상단바 타이틀 변경
                    pageTitleEl.textContent = this.getAttribute('data-title');
                    pageTitleIcon.className = this.querySelector('i').className;
                    pageTitleIcon.style.color = 'var(--brand-primary)';

                    const targetId = this.getAttribute('data-target');
                    const targetIframe = document.getElementById(`iframe-${targetId}`);

                    // 3. 화면 탭 전환 (부드러운 로더 효과 반영)
                    loader.classList.add('show');

                    document.querySelectorAll('.app-iframe').forEach(iframe => {
                        iframe.classList.remove('active');
                    });

                    setTimeout(() => {
                        loader.classList.remove('show');
                        targetIframe.classList.add('active');
                    }, 150);

                    // 모바일 환경이면 클릭 후 사이드바 닫기
                    if (window.innerWidth <= 768) {
                        toggleSidebar();
                    }
                });
            });

            // ----- 모바일 사이드바 토글 로직 -----
            const sidebar = document.getElementById('sidebar');
            const sidebarOverlay = document.getElementById('sidebarOverlay');
            const menuToggleBtn = document.getElementById('menuToggle');

            function toggleSidebar() {
                sidebar.classList.toggle('open');
                sidebarOverlay.classList.toggle('show');
            }

            menuToggleBtn.addEventListener('click', toggleSidebar);
            sidebarOverlay.addEventListener('click', toggleSidebar);

            // ----- 전체화면 토글 로직 -----
            const fullscreenBtn = document.getElementById('fullscreenToggle');
            fullscreenBtn.addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {
                        console.log(`Error attempting to enable fullscreen: ${err.message}`);
                    });
                    fullscreenBtn.classList.remove('fa-expand');
                    fullscreenBtn.classList.add('fa-compress');
                } else {
                    document.exitFullscreen();
                    fullscreenBtn.classList.remove('fa-compress');
                    fullscreenBtn.classList.add('fa-expand');
                }
            });
        });
    </script>
</body>

</html>
