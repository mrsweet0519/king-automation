<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>킹옥션 자동화 포털</title>
    <!-- 폰트어썸 (아이콘용) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #e60012;
            --primary-yellow: #ffcc00;
            --dark-bg: #111111;
            --light-bg: #f5f7fb;
            --white: #ffffff;
            --gray: #888888;
            --text-main: #333333;
        }

        body {
            font-family: 'Pretendard', 'Malgun Gothic', Tahoma, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light-bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 스마트폰 앱 느낌의 상단 헤더 */
        header {
            background: var(--dark-bg);
            color: var(--white);
            padding: 20px 20px 30px;
            text-align: center;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            position: relative;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 900;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: var(--primary-red);
        }

        .sub-text {
            font-size: 13px;
            color: #aaaaaa;
            margin-top: 5px;
        }

        .user-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 15px;
            color: var(--primary-yellow);
            font-weight: 600;
        }

        /* 메인 콘텐츠 영역 (버튼들) */
        .container {
            flex: 1;
            padding: 30px 20px;
            max-width: 500px; /* 모바일 폭 기준 중앙 정렬 */
            margin: -20px auto 0;
            width: 100%;
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        .menu-title {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 15px;
            color: var(--dark-bg);
        }

        .button-grid {
            display: grid;
            gap: 15px;
        }

        /* 개별 버튼 스타일 */
        .app-btn {
            display: flex;
            align-items: center;
            background: var(--white);
            padding: 20px;
            border-radius: 20px;
            text-decoration: none;
            color: var(--text-main);
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .app-btn:active {
            transform: scale(0.98);
            background: #f8f9fa;
        }

        .icon-box {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 15px;
            color: var(--white);
            flex-shrink: 0;
        }

        .bg-red { background: linear-gradient(135deg, #ff416c, #ff4b2b); }
        .bg-blue { background: linear-gradient(135deg, #36d1dc, #5b86e5); }
        .bg-dark { background: linear-gradient(135deg, #434343, #000000); }
        .bg-green { background: linear-gradient(135deg, #11998e, #38ef7d); }

        .btn-text h3 {
            margin: 0 0 5px 0;
            font-size: 16px;
            font-weight: 800;
        }

        .btn-text p {
            margin: 0;
            font-size: 12px;
            color: var(--gray);
            line-height: 1.4;
        }

        .arrow-icon {
            margin-left: auto;
            color: #cccccc;
            font-size: 14px;
        }

        /* 하단 푸터 */
        footer {
            text-align: center;
            padding: 30px 20px;
            font-size: 12px;
            color: var(--gray);
            background: transparent;
        }
    </style>
</head>
<body>

    <header>
        <h1 class="logo-text">킹옥션 <span>포털</span></h1>
        <div class="sub-text">부동산 실전수익반 통합 관리 시스템</div>
        <div class="user-badge"><i class="fa-solid fa-crown"></i> Admin Access</div>
    </header>

    <div class="container">
        <div class="menu-title">⚡ 빠른 실행</div>
        <div class="button-grid">
            
            <!-- CRM 고객관리 버튼 -->
            <a href="킹옥션_CRM_시스템.html" class="app-btn">
                <div class="icon-box bg-blue">
                    <i class="fa-solid fa-users"></i>
                </div>
                <div class="btn-text">
                    <h3>CRM 고객 관리</h3>
                    <p>신규 고객 등록, 대화 히스토리 및<br>기수별 명단 보관함 (PC/모바일)</p>
                </div>
                <div class="arrow-icon"><i class="fa-solid fa-chevron-right"></i></div>
            </a>

            <!-- 마케팅 대시보드 버튼 -->
            <a href="킹옥션_마케팅_통합_대시보드.html" class="app-btn">
                <div class="icon-box bg-red">
                    <i class="fa-solid fa-chart-line"></i>
                </div>
                <div class="btn-text">
                    <h3>마케팅 통합 대시보드</h3>
                    <p>인스타/유튜브 광고 비용 추적 및<br>채널별 실시간 전환율 분석</p>
                </div>
                <div class="arrow-icon"><i class="fa-solid fa-chevron-right"></i></div>
            </a>

            <!-- 세관공매 물건 분석 (예시용, 추후 확장을 위해) -->
            <a href="#" class="app-btn" onclick="alert('데이터 연동 준비 중입니다.'); return false;">
                <div class="icon-box bg-dark">
                    <i class="fa-solid fa-box-open"></i>
                </div>
                <div class="btn-text">
                    <h3>세관공매 수익 분석 <span style="font-size:10px; background:#eee; padding:2px 5px; border-radius:5px; color:#888;">준비중</span></h3>
                    <p>수입 화물 및 압류품 원가/수익률 계산</p>
                </div>
                <div class="arrow-icon"><i class="fa-solid fa-chevron-right"></i></div>
            </a>

            <!-- 구글 드라이브 자료실 직행 -->
            <a href="https://drive.google.com/drive/folders/1B3jX0R5fP4M9Z-y082D5C8D-U4c_rM2e" target="_blank" class="app-btn">
                <div class="icon-box bg-green">
                    <i class="fa-brands fa-google-drive"></i>
                </div>
                <div class="btn-text">
                    <h3>그래비티 클라우드</h3>
                    <p>결과물, 콘텐츠 원본, 자동화 스크립트<br>구글 드라이브 폴더 열기</p>
                </div>
                <div class="arrow-icon"><i class="fa-solid fa-external-link-alt" style="font-size: 12px;"></i></div>
            </a>

        </div>
    </div>

    <footer>
        © 2026 KING AUCTION x GRAVITY AI<br>
        All Systems Operational.
    </footer>

</body>
</html>
